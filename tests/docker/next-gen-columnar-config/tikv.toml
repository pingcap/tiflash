[storage]
# No space is reserved at all for testing
reserve-space = "0"
# Enable keyspace and ttl for next-gen
api-version = 2
enable-ttl = true
low-space-threshold = 0

[raftstore]
# 0 means use full disk capacity; avoid false "no available space"
# on large host mounts since https://github.com/tidbcloud/cloud-storage-engine/pull/4728.
capacity = 0

# object storage for next-gen
[dfs]
prefix = "tikv"
s3-endpoint = "http://minio0:9000"
s3-key-id = "minioadmin"
s3-secret-key = "minioadmin"
s3-bucket = "tiflash-test"
s3-region = "local"
# delegate compaction to tikv-worker
remote-compactor-addr = "http://tikv-worker0:19000/compact"

[kvengine]
# columnar and fts index on next-gen
build-columnar = true
build-fts-index = true

services:
  tiflash-cn0:
    image: ${TIFLASH_IMAGE:-hub.pingcap.net/tiflash/tiflash-ci-base:rocky8-20241028}
    # TiFlash and tiflash-proxy create many threads; the default container
    # pids_limit (2048) is too low and causes fork/exec failures (errno 11).
    pids_limit: -1
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./next-gen-columnar-config/tiflash_cn.toml:/tiflash.toml:ro
      - ./next-gen-columnar-config/tiflash_cn_proxy.toml:/tiflash_tikv.toml:ro
      - ./data/tiflash-cn0:/data
      - ./log/tiflash-cn0:/log
      - ..:/tests
      - ../docker/_env.sh:/tests/_env.sh
    entrypoint: /tiflash/tiflash server --config-file /tiflash.toml
    depends_on:
      - "minio0"
      - "tikv0"
    environment:
      - MALLOC_CONF=prof:true,prof_active:false
    restart: on-failure

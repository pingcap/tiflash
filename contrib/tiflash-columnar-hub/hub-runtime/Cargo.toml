[package]
name = "tiflash-columnar-hub-runtime"
version = "0.1.0"
edition = "2021"
publish = false

[features]
default = []
external-jemalloc = []
failpoints = ["fail/failpoints"]

[lib]
name = "tiflash_proxy"
crate-type = ["cdylib"]

[dependencies]
api_version = { workspace = true }
backtrace = "0.3"
builtin_dfs = { workspace = true }
bytes = "1.10.1"
clap = "2.32"
cloud_encryption = { workspace = true }
dashmap = "5.0"
fail = { version = "0.5", optional = true }
futures = "0.3"
grpcio = { version = "0.10.4", features = ["nightly", "openssl-vendored", "protobuf-codec"], default-features = false }
hex = "0.4"
hyper = { version = "0.14.26", features = ["full", "runtime"] }
keys = { workspace = true }
kvengine = { workspace = true }
kvenginepb = { workspace = true }
kvproto = { git = "https://github.com/pingcap/kvproto.git" }
lazy_static = "1.5.0"
num_cpus = "1"
pd_client = { workspace = true }
pprof = { version = "0.15", default-features = false, features = ["flamegraph", "frame-pointer", "protobuf-codec"] }
pprof_util = { version = "0.8.2", features = ["flamegraph"] }
prometheus = { version = "0.13", features = ["nightly", "push"], default-features = true }
protobuf = { version = "2.8", features = ["bytes"], default-features = true }
quick_cache = "0.6.14"
regex = "1"
security = { workspace = true }
serde = { version = "1.0.194", features = ["derive"] }
serde_json = { version = "1.0.140", features = ["preserve_order"] }
slog = { version = "2.3", features = ["max_level_trace", "release_max_level_debug"] }
slog-global = { git = "https://github.com/breeswish/slog-global.git", rev = "d592f88e4dbba5eb439998463054f1a44fbf17b9", default-features = true }
tempfile = "3"
thiserror = "1.0.44"
tikv_util = { workspace = true }
tipb = { git = "https://github.com/pingcap/tipb.git" }
tokio = { version = "=1.26.0", features = ["fs", "full", "macros", "net", "process", "rt", "rt-multi-thread", "sync", "time"], default-features = true }
# Keep tokio-executor aligned with the tokio-timer hotfix used by tikv_util.
tokio-executor = "=0.1.9"
toml = "0.5"
url = "2"
